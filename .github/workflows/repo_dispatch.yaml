name: GitHub Actions repo dispatch Demo
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on:
  repository_dispatch:
    types: [registration]

jobs:
  register-tenant:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update registration
        run: |
          echo -e "---\n${{ github.event.client_payload.owner }}:\n  expiry: `date --date "next year" "+%Y-%m-%d"`\n  users: [${{ join(github.event.client_payload.users) }}]" > ${{ github.event.client_payload.owner }}.yaml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "registration: ${{ github.event.client_payload.owner }}"
          title: "feat: Registration ${{ github.event.client_payload.owner }}"
          body: Register a tenant
          branch: "reg-${{ github.event.client_payload.owner }}"
